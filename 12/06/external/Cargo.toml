[workspace]
members = [
    "resvg/crates/c-api",
    "resvg/crates/resvg",
    "resvg/crates/usvg",
    "resvg/crates/usvg/codegen",
    "xmlwriter",
    "svg-rs",
]
resolver = "2"

[workspace.dependencies]
xmlwriter = { version = "0.1.0", path = "xmlwriter" }
resvg = { path = "resvg/crates/resvg" }
svg = { path = "svg-rs" }

[workspace.package]
license = "Apache-2.0 OR MIT"
