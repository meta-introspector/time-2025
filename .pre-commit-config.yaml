# .pre-commit-config.yaml
# This file defines pre-commit hooks for the project.
# It leverages the pre-commit framework to ensure code quality and consistency.
#
# Hooks are defined using 'language: system' to utilize tools available in the
# Nix development environment (flake.nix).

repos:
  - repo: local
    hooks:
      # - id: nixpkgs-fmt
      #   name: nixpkgs-fmt
      #   entry: nixpkgs-fmt
      #   language: system
      #   files: \.nix$
        # This hook ensures Nix files are formatted consistently, embodying
        # the bott principle of "Pattern Discernment" (bott 5).

      - id: statix
        name: statix
        entry: bash -c "statix check || true"
        language: system
        files: \.nix$
        pass_filenames: false
        # This hook performs static analysis on Nix files, contributing to
        # "Verification and Testing" (bott 10) and "Error Analysis" (bott 9).

      - id: nix-url-check
        name: Nix URL Policy Check
        entry: bash scripts/nix_url_check.sh
        language: system
        files: \.nix$
        # Ensures all Nix flake inputs (nixpkgs, flake-utils) adhere to the
        # github:meta-introspector policy, enforcing "Integration and Session Correlation" (bott 17).

      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        files: \.sh$
        # Ensures shell scripts adhere to best practices, aiding in
        # "Verification and Testing" (bott 10).





      - id: script-sop-check
        name: Script SOP Documentation Check
        entry: 09/27/7-concepts/5-scripts-automation/script_sop_check.sh
        language: system
        files: \.(sh|py|rs|nix)$


  - repo: https://github.com/meta-introspector/vale-precommit
    rev: 318812b24e90f97e458497976282014ee25a52fd
    hooks:
      - id: vale-system
        args: [--config, ./.vale.ini]
        # Prose linter for checking writing style, grammar, and tone.

