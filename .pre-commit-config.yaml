# .pre-commit-config.yaml
# This file defines pre-commit hooks for the project.
# It leverages the pre-commit framework to ensure code quality and consistency.
#
# Hooks are defined using 'language: system' to utilize tools available in the
# Nix development environment (flake.nix).

repos:
- repo: local
  hooks:
    - id: nixpkgs-fmt
      name: nixpkgs-fmt
      entry: nixpkgs-fmt
      language: system
      files: \.nix$    
    - id: statix
      name: statix
      entry: statix check --config statix.toml
      language: system
      files: \.nix$
      pass_filenames: false
      # - id: deadnix
      #   name: deadnix
      #   entry: nix develop --command bash -c "deadnix"
      #   language: system
      #   files: \.nix$
        # This hook finds unused variable bindings in Nix files, promoting code purity and cleanliness.
    - id: shellcheck
      name: shellcheck
      entry: shellcheck -x
      language: system
      files: \.sh$
      pass_filenames: true

    - id: vale-system
      name: vale
      entry: vale
      language: system
      args: [--config, ./.vale.ini]
  #    repo: https://github.com/meta-introspector/vale-precommit
  #    rev: 318812b24e90f97e458497976282014ee25a52fd

