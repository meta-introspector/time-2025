# .pre-commit-config.yaml
# This file defines pre-commit hooks for the project.
# It leverages the pre-commit framework to ensure code quality and consistency.
#
# Hooks are defined using 'language: system' to utilize tools available in the
# Nix development environment (flake.nix).

repos:
  - repo: local
    hooks:
    - id: nixpkgs-fmt
      name: nixpkgs-fmt
      entry: nixpkgs-fmt
      language: system
      files: \.nix$

    - id: statix
      name: statix
      entry: bash -c "statix check --config statix.toml"
      language: system
      files: \.nix$
      #pass_filenames: false        # This hook performs static analysis on Nix files, contributing to
      # "Verification and Testing" (bott 10) and "Error Analysis" (bott 9).

    - id: deadnix
      name: deadnix
      entry: nix develop --command bash -c "deadnix"
      language: system
      files: \.nix$
      #pass_filenames: false
      # This hook finds unused variable bindings in Nix files, promoting code purity and cleanliness.

    - id: shellcheck
      name: shellcheck
      entry: shellcheck -x
      language: system
      files: \.sh$
      # Ensures shell scripts adhere to best practices, aiding in
      # "Verification and Testing" (bott 10).

      # - id: script-sop-check
